<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #0A3D5C 0%, #0D5C63 50%, #147A7A 100%);
    color: #FFFFFF;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
    background: #FFFFFF;
  }
  .bg-circle-1 { width: 500px; height: 500px; top: -120px; left: -180px; }
  .bg-circle-2 { width: 350px; height: 350px; bottom: -80px; right: -120px; }
  .icon {
    font-size: 80px;
    margin-bottom: 48px;
  }
  .headline {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 40px;
    max-width: 850px;
  }
  .highlight { color: #FF6B35; }
  .body-text {
    font-size: 34px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.85);
    max-width: 780px;
    margin-bottom: 56px;
  }
  .cta-button {
    background: #FF6B35;
    color: #FFFFFF;
    border: none;
    border-radius: 60px;
    padding: 28px 64px;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 48px;
    box-shadow: 0 8px 32px rgba(255,107,53,0.35);
  }
  .doctor-info {
    margin-top: 20px;
  }
  .doctor-name {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .doctor-title {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
  }
  .footer {
    position: absolute;
    bottom: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
  }
  .footer-dot {
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="headline">Seus olhos merecem <span class="highlight">atenção</span></div>
  <div class="body-text">
    Mande para alguém da sua família que tem mais de 60 anos. Se faz tempo que você não fez um exame oftalmológico completo, esse é o seu sinal.
  </div>
  <div class="cta-button">Agende sua consulta</div>
  <div class="doctor-info">
    <div class="doctor-name">Dr. Thiago Russo</div>
    <div class="doctor-title">Oftalmologista — CEDOA</div>
  </div>
  <div class="footer">
    <span>@drthiagorusso</span>
    <span class="footer-dot"></span>
    <span>CEDOA</span>
  </div>
</body>
</html>
